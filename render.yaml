services:
  # ── Backend API (FastAPI) ──
  - type: web
    name: noticiando-pe-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -e ".[dev]"
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_SYNC
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ADMIN_ID
        value: "6922534707"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: HF_API_TOKEN
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@noticiando.pe
      - key: ADMIN_PASSWORD
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: RENDER_EXTERNAL_URL
        value: https://noticiando-pe-api.onrender.com

  # ── Cron Job (Keep Alive + Scraping cada 15 min) ──
  - type: cron
    name: noticiando-pe-cron
    schedule: "*/15 * * * *"
    buildCommand: pip install -e ".[dev]"
    startCommand: python scripts/run.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_SYNC
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ADMIN_ID
        value: "6922534707"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: HF_API_TOKEN
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: LOG_LEVEL
        value: INFO
